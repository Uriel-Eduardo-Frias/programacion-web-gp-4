<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../styles/formulario-registrar.css">

<body>

  <body>

    <main class="contenedor-registro">
        
        <section class="card-registro">
            <h1>Registrarse</h1>

            <form action="#">
                <div class="input-box">
                    <input type="text" placeholder="Nombre de usuario" required>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Correo electrónico" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Contraseña" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Confirmar contraseña" required>
                </div>

                <div class="terminos-condiciones">
                    <label>
                        <input type="checkbox" required> Acepto los términos y condiciones
                    </label>
                </div>

                <button type="submit" class="btn">Crear cuenta</button>

                <div class="link-redireccion">
                    <p>¿Ya tienes una cuenta? <a href="formulario-loguear.html">Iniciar Sesión</a></p>
                </div>
            </form>
        </section>

    </main>







  <footer class="pie-pagina">
    <div class="contenedor-footer">
        
        <div class="columna-footer">
            <h3>Contactos</h3>
            <p>Soporte: info@tusitio.com</p>
            <p>Teléfono: +123 456 789</p>
        </div>

        <div class="columna-footer">
            <h3>Nuestro Equipo</h3>
            <ul>
                <li>Juan Pérez - Desarrollador</li>
                <li>María García - Diseñadora</li>
            </ul>
        </div>

        <div class="columna-footer">
            <h3>Síguenos</h3>
            <div class="redes-sociales">
                <a href="#" class="icono-red">Facebook</a>
                <a href="#" class="icono-red">Instagram</a>
                <a href="#" class="icono-red">Twitter</a>
            </div>
        </div>

    </div>
    <div class="derechos-autor">
        <p>&copy; 2026 Netflix - Todos los derechos reservados</p>
    </div>
</footer>







    
</body>
</html>
